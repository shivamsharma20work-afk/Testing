kind: Deployment
apiVersion: apps/v1
metadata:
  name: backend-deployment 
  namespace: testing-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: shivam011/backend-images
        ports:
        - containerPort: 5000