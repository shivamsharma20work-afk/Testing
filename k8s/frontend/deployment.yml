apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: testing-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend-image
          image: shivam011/frontend-images:latest
          ports:
            - containerPort: 3000